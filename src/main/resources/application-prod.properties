# Production Properties (Placeholders - to be filled via environment variables)
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=lms_prod_db

# Logging
logging.level.com.lms=INFO
logging.level.org.springframework.security=WARN

# JWT Secret
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000
jwt.refresh-expiration=86400000

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# Razorpay
razorpay.key_id=${RAZORPAY_KEY}
razorpay.key_secret=${RAZORPAY_SECRET}
